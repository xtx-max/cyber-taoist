<!DOCTYPE html><html><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>赛博天师</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fef9f0;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'PingFang SC','Microsoft YaHei',sans-serif}
.card{text-align:center;padding:40px 24px;max-width:400px}
h1{font-size:2rem;background:linear-gradient(135deg,#c41e3a,#a07830);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
.btn{display:inline-block;padding:14px 40px;background:linear-gradient(135deg,#c9a84c,#a07830);color:#fff;border-radius:28px;text-decoration:none;font-size:1.1rem;font-weight:600;margin:8px;box-shadow:0 4px 20px rgba(160,120,48,0.3)}
.loading{margin:20px 0;color:#7a6a5c;font-size:0.9rem}
</style></head><body>
<div class="card">
<h1>☯ 赛博天师</h1>
<p style="color:#7a6a5c;margin-bottom:20px">正在加载完整版…</p>
<div class="loading" id="status">连接中…</div>
<button class="btn" onclick="location.reload()" style="background:transparent;border:1px solid #c9a84c;color:#a07830">🔄 点此刷新</button>
<p style="font-size:0.75rem;color:#999;margin-top:20px">如加载失败，请关闭WiFi用流量再试<br>或保存此链接到浏览器中打开</p>
</div>
<script>
var url='https://xtx-max.github.io/cyber-taoist/';
var s=document.getElementById('status');
var t=setTimeout(function(){s.textContent='网络较慢，请稍候…';},3000);
setTimeout(function(){s.textContent='如10秒未打开，请点刷新按钮';},8000);
fetch(url,{method:'HEAD'}).then(function(){
  window.location.href=url;
}).catch(function(){
  clearTimeout(t);
  s.textContent='检测到网络限制，尝试直接跳转…';
  window.location.href=url;
});
</script>
</body></html>
